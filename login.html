<!DOCTYPE html>
<html data-theme="light">
<head>
<title>KPI System - Login</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="shared.js" defer></script>
<style>
  body {
    background: linear-gradient(135deg, #0d1117 0%, #1a1a2e 50%, #0f3460 100%) !important;
    min-height: 100vh;
  }

  .login-card {
    border: none; border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    color: #fff;
    animation: slideUp 0.5s 0.3s ease both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .login-card .card-header {
    background: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 28px 28px 20px;
  }
  .login-card .card-body { padding: 28px; }
  .login-card label {
    color: #8b949e; font-size: 0.82rem; margin-bottom: 6px;
    display: block; font-weight: 600; letter-spacing: 0.3px;
  }
  .login-card .form-control {
    background: rgba(255,255,255,0.07) !important;
    border: 1.5px solid rgba(255,255,255,0.12) !important;
    color: #fff !important; border-radius: 10px; padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-card .form-control:focus {
    background: rgba(255,255,255,0.1) !important;
    border-color: #4f8ef7 !important;
    box-shadow: 0 0 0 3px rgba(79,142,247,0.2) !important;
  }
  .login-card .form-control::placeholder { color: rgba(255,255,255,0.25) !important; }

  .role-tabs {
    display: flex; gap: 6px; margin-bottom: 22px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 5px;
  }
  .role-tab {
    flex: 1; padding: 9px 10px; border-radius: 9px;
    text-align: center; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; border: none; background: transparent;
    color: rgba(255,255,255,0.4); transition: all 0.25s;
    letter-spacing: 0.2px;
  }
  .role-tab.active-admin {
    background: linear-gradient(135deg, #4f8ef7, #764ba2);
    color: #fff; box-shadow: 0 2px 10px rgba(79,142,247,0.4);
  }
  .role-tab.active-emp {
    background: linear-gradient(135deg, #00e5a0, #4f8ef7);
    color: #0a1a14; box-shadow: 0 2px 10px rgba(0,229,160,0.35);
  }
  .role-tab:hover:not(.active-admin):not(.active-emp) {
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.06);
  }

  .btn-login {
    border: none; border-radius: 10px; padding: 12px;
    font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px;
    color: #fff; width: 100%; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-login.admin-btn {
    background: linear-gradient(135deg, #4f8ef7, #764ba2);
    box-shadow: 0 4px 15px rgba(79,142,247,0.4);
  }
  .btn-login.emp-btn {
    background: linear-gradient(135deg, #00e5a0, #4f8ef7);
    color: #0a1a14;
    box-shadow: 0 4px 15px rgba(0,229,160,0.35);
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-2px); }
  .btn-login:active { transform: translateY(0); }

  #error-msg {
    display: none;
    background: rgba(220,53,69,0.12);
    border: 1px solid rgba(220,53,69,0.35);
    color: #ff8a9a; border-radius: 10px;
    padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px;
  }

  .kpi-logo {
    width: 56px; height: 56px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px; font-size: 26px;
  }
  .kpi-logo.admin-logo {
    background: linear-gradient(135deg, #4f8ef7, #764ba2);
    box-shadow: 0 4px 16px rgba(79,142,247,0.4);
  }
  .kpi-logo.emp-logo {
    background: linear-gradient(135deg, #00e5a0, #4f8ef7);
    box-shadow: 0 4px 16px rgba(0,229,160,0.3);
  }

  .hint-bar {
    margin-top: 16px; border-radius: 10px; padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    font-size: 0.75rem; color: rgba(255,255,255,0.35);
    text-align: center; line-height: 1.6;
  }
  .hint-bar code { color: #7c9ef7; }
  .hint-bar.emp-hint code { color: #00e5a0; }

  /* Forgot password link */
  .forgot-link {
    display: block; text-align: right;
    margin-top: -10px; margin-bottom: 18px;
    font-size: 0.78rem; font-weight: 600;
    color: rgba(255,255,255,0.35);
    text-decoration: none; transition: color 0.2s;
  }
  .forgot-link:hover { color: rgba(255,255,255,0.7); }

  .login-dark-btn {
    position: fixed; top: 18px; right: 20px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 20px; padding: 6px 14px;
    color: rgba(255,255,255,0.75); font-size: 0.78rem;
    font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s; z-index: 10;
  }
  .login-dark-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* Forgot password modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-box {
    background: #0e1018; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px; padding: 32px 28px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    transform: translateY(16px); transition: transform 0.25s;
  }
  .modal-overlay.show .modal-box { transform: translateY(0); }
  .modal-box h5 { font-size: 1rem; font-weight: 800; margin-bottom: 6px; color: #e8eaf0; }
  .modal-box p  { font-size: 0.8rem; color: #5a6070; margin-bottom: 20px; }
  .modal-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .modal-tab {
    flex: 1; padding: 7px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
    border: 1.5px solid rgba(255,255,255,0.1); background: transparent;
    color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .modal-tab.active { background: rgba(79,142,247,0.15); border-color: #4f8ef7; color: #4f8ef7; }
  .modal-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #5a6070; margin-bottom: 6px; display: block; }
  .modal-input {
    width: 100%; padding: 10px 13px; border-radius: 9px; font-size: 0.88rem;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
    color: #e8eaf0; outline: none; margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: #4f8ef7; }
  .modal-input::placeholder { color: rgba(255,255,255,0.2); }
  .modal-btn {
    width: 100%; padding: 11px; border-radius: 9px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #4f8ef7, #764ba2);
    color: #fff; font-weight: 700; font-size: 0.9rem; transition: all 0.2s;
    box-shadow: 0 3px 12px rgba(79,142,247,0.3);
  }
  .modal-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .modal-close {
    float: right; background: none; border: none; cursor: pointer;
    color: #5a6070; font-size: 1.1rem; margin-top: -4px; transition: color 0.2s;
  }
  .modal-close:hover { color: #e8eaf0; }
  .modal-alert {
    border-radius: 8px; padding: 9px 12px; font-size: 0.8rem;
    margin-bottom: 14px; display: none;
  }
  .modal-alert.success { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); color: #00e5a0; }
  .modal-alert.error   { background: rgba(255,107,122,0.1); border: 1px solid rgba(255,107,122,0.3); color: #ff6b7a; }
  .modal-select {
    width: 100%; padding: 10px 13px; border-radius: 9px; font-size: 0.88rem;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
    color: #e8eaf0; outline: none; margin-bottom: 14px; appearance: none;
    transition: border-color 0.2s;
  }
  .modal-select:focus { border-color: #4f8ef7; }
  .modal-select option { background: #13151f; }
</style>
</head>
<body>

<button class="login-dark-btn" id="darkBtn" onclick="toggleDark()">🌙 Dark</button>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeForgot()">✕</button>
    <h5>🔑 Reset Password</h5>
    <p>Choose your role and set a new password</p>

    <div class="modal-tabs">
      <div class="modal-tab active" id="mTabAdmin" onclick="switchModalRole('admin')">🛡 Admin</div>
      <div class="modal-tab"       id="mTabEmp"   onclick="switchModalRole('employee')">👤 Employee</div>
    </div>

    <div id="modalAlert" class="modal-alert"></div>

    <div id="empSelectWrap" style="display:none;">
      <label class="modal-label">Select Employee</label>
      <select class="modal-select" id="modalEmpSelect">
        <option value="">— Choose employee —</option>
      </select>
    </div>

    <label class="modal-label">New Password</label>
    <input type="password" class="modal-input" id="modalNewPass" placeholder="Min 6 characters">

    <label class="modal-label">Confirm Password</label>
    <input type="password" class="modal-input" id="modalConfirmPass" placeholder="Re-enter password">

    <button class="modal-btn" onclick="resetPassword()">Update Password</button>
  </div>
</div>

<div id="pageContent">
  <div class="container">
    <div class="row justify-content-center align-items-center" style="min-height:100vh;">
      <div class="col-md-4 col-sm-10">
        <div class="login-card">

          <div class="card-header text-center">
            <div class="kpi-logo admin-logo" id="loginLogo">📊</div>
            <h4 style="color:#e6edf3; font-weight:800; margin:0 0 4px;">KPI Monitoring System</h4>
            <small style="color:#8b949e; font-size:0.8rem;" id="loginSubtitle">Sign in as Admin</small>
          </div>

          <div class="card-body">

            <div class="role-tabs">
              <button class="role-tab active-admin" id="tabAdmin" onclick="switchRole('admin')">🛡 Admin</button>
              <button class="role-tab"              id="tabEmp"   onclick="switchRole('employee')">👤 Employee</button>
            </div>

            <div id="error-msg">⚠️ <span id="error-text">Invalid username or password.</span></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
              <div class="mb-3">
                <label id="userLabel">Username</label>
                <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username">
              </div>
              <div class="mb-1">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
              </div>
              <a href="#" class="forgot-link" onclick="openForgot(); return false;">Forgot password?</a>
              <button type="submit" class="btn-login admin-btn" id="loginBtn">Login as Admin →</button>
            </form>

            

          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentRole = 'admin';
  let modalRole   = 'admin';

  function switchRole(role) {
    currentRole = role;
    const isAdmin = role === 'admin';

    document.getElementById('tabAdmin').className = 'role-tab' + (isAdmin ? ' active-admin' : '');
    document.getElementById('tabEmp').className   = 'role-tab' + (!isAdmin ? ' active-emp' : '');

    const logo = document.getElementById('loginLogo');
    logo.className   = 'kpi-logo ' + (isAdmin ? 'admin-logo' : 'emp-logo');
    logo.textContent = isAdmin ? '📊' : '👤';
    document.getElementById('loginSubtitle').textContent = isAdmin ? 'Sign in as Admin' : 'Sign in as Employee';
    document.getElementById('userLabel').textContent     = isAdmin ? 'Username' : 'Your First Name';
    document.getElementById('username').placeholder      = isAdmin ? 'admin' : 'e.g. raj';
    document.getElementById('password').placeholder      = isAdmin ? 'Enter password' : 'emp123 (default)';

    const btn = document.getElementById('loginBtn');
    btn.textContent = isAdmin ? 'Login as Admin →' : 'Enter Employee Portal →';
    btn.className   = 'btn-login ' + (isAdmin ? 'admin-btn' : 'emp-btn');

    const hint = document.getElementById('hintBar');
    hint.className = 'hint-bar' + (!isAdmin ? ' emp-hint' : '');
    hint.innerHTML = isAdmin
      ? 'Admin: <code>admin</code> / <code>admin123</code>'
      : 'Username: <code>your first name (lowercase)</code> &nbsp;|&nbsp; Password: <code>emp123</code>';

    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }

  function handleLogin(event) {
    event.preventDefault();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    const errorTxt = document.getElementById('error-text');

    if (currentRole === 'admin') {
      const adminPass = localStorage.getItem('kpi_admin_password') || 'admin123';
      if (username === 'admin' && password === adminPass) {
        errorMsg.style.display = 'none';
        sessionStorage.setItem('kpi_logged_in', 'true');
        sessionStorage.setItem('kpi_user', 'admin');
        sessionStorage.setItem('kpi_role', 'admin');
        window.location.href = 'dashboard.html';
      } else {
        errorTxt.textContent = 'Invalid admin credentials.';
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } else {
      const employees = JSON.parse(localStorage.getItem('kpi_employees') || '[]');
      const emp = employees.find(e => e.name.trim().split(' ')[0].toLowerCase() === username);
      const passwords   = JSON.parse(localStorage.getItem('kpi_emp_passwords') || '{}');
      const correctPass = emp ? (passwords[emp.id] || 'emp123') : null;

      if (emp && password === correctPass) {
        errorMsg.style.display = 'none';
        sessionStorage.setItem('kpi_emp_logged_in', 'true');
        sessionStorage.setItem('kpi_emp_id',   emp.id);
        sessionStorage.setItem('kpi_emp_name', emp.name);
        sessionStorage.setItem('kpi_role',     'employee');
        window.location.href = 'emp_portal.html';
      } else if (!emp) {
        errorTxt.textContent = 'No employee found with that name.';
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
      } else {
        errorTxt.textContent = 'Wrong password. Default is emp123.';
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  }

  function openForgot() {
    const modal = document.getElementById('forgotModal');
    modal.classList.add('show');
    clearModalAlert();
    document.getElementById('modalNewPass').value = '';
    document.getElementById('modalConfirmPass').value = '';
    switchModalRole('admin');
    populateModalEmployees();
  }

  function closeForgot() {
    document.getElementById('forgotModal').classList.remove('show');
  }

  function switchModalRole(role) {
    modalRole = role;
    document.getElementById('mTabAdmin').className = 'modal-tab' + (role === 'admin' ? ' active' : '');
    document.getElementById('mTabEmp').className   = 'modal-tab' + (role === 'employee' ? ' active' : '');
    document.getElementById('empSelectWrap').style.display = role === 'employee' ? 'block' : 'none';
    clearModalAlert();
  }

  function populateModalEmployees() {
    const employees = JSON.parse(localStorage.getItem('kpi_employees') || '[]');
    const sel = document.getElementById('modalEmpSelect');
    sel.innerHTML = '<option value="">— Choose employee —</option>';
    employees.forEach(e => { sel.innerHTML += `<option value="${e.id}">${e.name} — ${e.department}</option>`; });
  }

  function clearModalAlert() {
    const a = document.getElementById('modalAlert');
    a.style.display = 'none'; a.className = 'modal-alert';
  }

  function showModalAlert(msg, type) {
    const a = document.getElementById('modalAlert');
    a.textContent = msg;
    a.className = 'modal-alert ' + type;
    a.style.display = 'block';
  }

  function resetPassword() {
    const newPass     = document.getElementById('modalNewPass').value;
    const confirmPass = document.getElementById('modalConfirmPass').value;

    if (newPass.length < 6)    { showModalAlert('Password must be at least 6 characters.', 'error'); return; }
    if (newPass !== confirmPass){ showModalAlert('Passwords do not match.', 'error'); return; }

    if (modalRole === 'admin') {
      localStorage.setItem('kpi_admin_password', newPass);
      showModalAlert('✅ Admin password updated successfully!', 'success');
    } else {
      const empId = document.getElementById('modalEmpSelect').value;
      if (!empId) { showModalAlert('Please select an employee.', 'error'); return; }
      const passwords = JSON.parse(localStorage.getItem('kpi_emp_passwords') || '{}');
      passwords[empId] = newPass;
      localStorage.setItem('kpi_emp_passwords', JSON.stringify(passwords));
      showModalAlert('✅ Employee password updated successfully!', 'success');
    }

    document.getElementById('modalNewPass').value    = '';
    document.getElementById('modalConfirmPass').value = '';
    setTimeout(closeForgot, 1800);
  }

  document.getElementById('forgotModal').addEventListener('click', function(e) {
    if (e.target === this) closeForgot();
  });
</script>
</body>
</html>
