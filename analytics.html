<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<title>KPI Analytics Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Apply saved theme BEFORE render to avoid flash
  (function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('kpi_theme') || 'dark'); })();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Theme Variables ── */
  :root {
    --bg:       #07080f;
    --surface:  #0e1018;
    --surface2: #13151f;
    --border:   rgba(255,255,255,0.07);
    --text:     #e8eaf0;
    --muted:    #5a6070;
    --navbar-bg:rgba(14,16,24,0.92);
    --card-hover-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  [data-theme="light"] {
    --bg:       #f0f2f5;
    --surface:  #ffffff;
    --surface2: #f4f6fb;
    --border:   rgba(0,0,0,0.07);
    --text:     #1a1d2e;
    --muted:    #8a93a8;
    --navbar-bg:rgba(20,22,38,0.97);
    --card-hover-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  * { transition: background-color 0.3s, color 0.2s, border-color 0.2s; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* ── Navbar ── */
  .navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 62px;
    background: var(--navbar-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .navbar-brand {
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
    background: linear-gradient(135deg, #4f8ef7, #00e5a0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px; white-space: nowrap;
  }
  .navbar-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .nav-link {
    padding: 6px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 600;
    color: rgba(255,255,255,0.5); text-decoration: none; border: 1px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .nav-link:hover   { color: #fff; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
  .nav-link.active  { color: #4f8ef7; border-color: rgba(79,142,247,0.35); background: rgba(79,142,247,0.1); }
  .nav-logout       { color: #ff6b7a !important; border-color: rgba(255,107,122,0.2) !important; }
  .nav-logout:hover { background: rgba(255,107,122,0.1) !important; }

  /* Dark Toggle */
  .dark-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-size: 0.76rem; font-weight: 700; letter-spacing: 0.3px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.7);
    transition: all 0.2s;
  }
  .dark-toggle:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* ── Layout ── */
  .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ── Page Header ── */
  .page-header { margin-bottom: 32px; }
  .page-header h1 { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; margin-bottom:4px; }
  .page-header p  { color:var(--muted); font-size:0.88rem; }

  /* ── Stat Cards ── */
  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  @media(max-width:900px){ .stat-grid { grid-template-columns:repeat(2,1fr); } }
  @media(max-width:500px){ .stat-grid { grid-template-columns:1fr; } }

  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:22px 24px;
    position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s;
    animation:fadeUp 0.5s ease both;
  }
  .stat-card:hover { transform:translateY(-3px); box-shadow:var(--card-hover-shadow); }
  .stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:16px 16px 0 0; }
  .stat-card.blue::after   { background:linear-gradient(90deg,#4f8ef7,#7cb9ff); }
  .stat-card.green::after  { background:linear-gradient(90deg,#00e5a0,#38ef7d); }
  .stat-card.yellow::after { background:linear-gradient(90deg,#ffd166,#ffb830); }
  .stat-card.red::after    { background:linear-gradient(90deg,#ff6b7a,#ff4d6d); }

  .stat-icon  { font-size:1.6rem; margin-bottom:10px; display:block; }
  .stat-label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:6px; }
  .stat-value { font-family:'Syne',sans-serif; font-size:2.4rem; font-weight:800; line-height:1; }
  .stat-value.blue   { color:#4f8ef7; }
  .stat-value.green  { color:#00e5a0; }
  .stat-value.yellow { color:#ffd166; }
  .stat-value.red    { color:#ff6b7a; }

  /* ── Charts Grid ── */
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  @media(max-width:900px){ .charts-grid { grid-template-columns:1fr; } }

  /* ── Card ── */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; overflow:hidden;
    animation:fadeUp 0.5s ease both;
  }
  .card-header {
    padding:18px 22px 14px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .card-title { font-family:'Syne',sans-serif; font-size:0.92rem; font-weight:800; letter-spacing:0.3px; color:var(--text); }
  .card-sub   { font-size:0.72rem; color:var(--muted); margin-top:2px; }
  .card-body  { padding:20px 22px; }

  /* ── Dept Breakdown ── */
  .dept-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .dept-row:last-child { border-bottom:none; }
  .dept-name { font-weight:600; font-size:0.85rem; flex:1; color:var(--text); }
  .dept-bar-wrap { flex:2; height:8px; background:var(--surface2); border-radius:99px; overflow:hidden; }
  .dept-bar-fill { height:100%; border-radius:99px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
  .dept-score { font-family:'Syne',sans-serif; font-weight:800; font-size:0.88rem; min-width:36px; text-align:right; }
  .dept-count { font-size:0.72rem; color:var(--muted); min-width:50px; text-align:right; }

  /* ── Leaderboard ── */
  .leader-row { display:flex; align-items:center; gap:12px; border-radius:8px; padding:10px 8px; transition:background 0.15s; border-bottom:1px solid var(--border); }
  .leader-row:last-child { border-bottom:none; }
  .leader-row:hover { background:var(--surface2); }
  .leader-rank  { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; min-width:28px; text-align:center; }
  .leader-name  { font-weight:600; font-size:0.88rem; color:var(--text); }
  .leader-dept  { font-size:0.72rem; color:var(--muted); }
  .leader-score { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; }
  .perf-pill    { padding:3px 10px; border-radius:99px; font-size:0.7rem; font-weight:700; }
  .perf-excellent { background:rgba(0,229,160,0.15); color:#00e5a0; }
  .perf-good      { background:rgba(255,209,102,0.15); color:#ffd166; }
  .perf-poor      { background:rgba(255,107,122,0.15); color:#ff6b7a; }

  /* ── Trend badge ── */
  .trend-badge { display:inline-flex; align-items:center; gap:4px; font-size:0.72rem; font-weight:700; padding:3px 8px; border-radius:6px; }
  .trend-up   { background:rgba(0,229,160,0.12); color:#00e5a0; }
  .trend-down { background:rgba(255,107,122,0.12); color:#ff6b7a; }

  /* ── Confetti ── */
  #confettiCanvas { position:fixed; inset:0; pointer-events:none; z-index:9999; }

  /* ── Empty ── */
  .empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:0.9rem; }
  .empty-icon { font-size:2.5rem; margin-bottom:12px; display:block; }

  /* ── Animations ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .delay-1{animation-delay:0.05s} .delay-2{animation-delay:0.1s}
  .delay-3{animation-delay:0.15s} .delay-4{animation-delay:0.2s}
  .delay-5{animation-delay:0.25s} .delay-6{animation-delay:0.3s}
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Confetti ── */
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#4f8ef7','#00e5a0','#ffd166','#ff6b7a','#b17bff','#fff'];
  const particles = Array.from({length:140}, () => ({
    x:Math.random()*canvas.width, y:-10-Math.random()*100,
    r:4+Math.random()*6, d:0.5+Math.random()*2,
    color:colors[Math.floor(Math.random()*colors.length)],
    tilt:Math.random()*10-10, tiltInc:0.07*(Math.random()*2-1),
    opacity:1, shape:Math.random()>0.5?'rect':'circle'
  }));
  let frame=0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      ctx.save(); ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
      ctx.beginPath();
      if(p.shape==='circle') ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      else ctx.rect(p.x,p.y,p.r*2,p.r);
      ctx.fill(); ctx.restore();
      p.y+=p.d+(frame/200); p.x+=Math.sin(frame/20)*0.8;
      p.tilt+=p.tiltInc;
      if(p.y>canvas.height*0.7) p.opacity-=0.015;
    });
    frame++;
    if(frame<220) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ── Animated Counter ── */
function AnimatedCounter({ target, duration=1200 }) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if(!target) return;
    let cur=0; const step=target/(duration/16);
    const t=setInterval(()=>{
      cur+=step;
      if(cur>=target){setCount(target);clearInterval(t);}
      else setCount(Math.floor(cur));
    },16);
    return ()=>clearInterval(t);
  },[target]);
  return <span>{count}</span>;
}

/* ── Chart Canvas ── */
function ChartCanvas({ id, type, data, options, height=240 }) {
  const ref=useRef(null), chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current=new Chart(ref.current.getContext('2d'),{type,data,options});
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify(data), JSON.stringify(options)]);
  return <div style={{position:'relative',height}}><canvas ref={ref} id={id}></canvas></div>;
}

/* ── App ── */
function App() {
  const [employees, setEmployees] = useState([]);
  const [kpiEntries, setKpiEntries] = useState([]);
  const [confettiFired, setConfettiFired] = useState(false);
  const [theme, setTheme] = useState(localStorage.getItem('kpi_theme') || 'dark');

  useEffect(()=>{
    const emps=JSON.parse(localStorage.getItem('kpi_employees')||'[]');
    const kpis=JSON.parse(localStorage.getItem('kpi_entries')||'[]');
    setEmployees(emps); setKpiEntries(kpis);
    const top=[...emps].sort((a,b)=>b.kpi-a.kpi)[0];
    if(top&&top.kpi>=120&&!confettiFired){
      setTimeout(()=>{launchConfetti();setConfettiFired(true);},900);
    }
  },[]);

  function toggleTheme() {
    const next = theme==='dark'?'light':'dark';
    setTheme(next);
    localStorage.setItem('kpi_theme', next);
    document.documentElement.setAttribute('data-theme', next);
  }

  const isDark = theme === 'dark';
  const gridColor   = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const tickColor   = isDark ? '#5a6070' : '#8a93a8';
  const tooltipBg   = isDark ? '#13151f' : '#ffffff';
  const tooltipText = isDark ? '#e8eaf0' : '#1a1d2e';

  /* ── Derived Data ── */
  const totalEmps = employees.length;
  const excellent = employees.filter(e=>e.kpi>=120).length;
  const good      = employees.filter(e=>e.kpi>=90&&e.kpi<120).length;
  const poor      = employees.filter(e=>e.kpi<90).length;
  const avgScore  = totalEmps ? Math.round(employees.reduce((s,e)=>s+e.kpi,0)/totalEmps) : 0;
  const topPerformer = [...employees].sort((a,b)=>b.kpi-a.kpi)[0];

  /* Dept breakdown */
  const deptMap={};
  employees.forEach(e=>{
    if(!deptMap[e.department]) deptMap[e.department]={total:0,count:0};
    deptMap[e.department].total+=e.kpi; deptMap[e.department].count++;
  });
  const depts=Object.entries(deptMap).map(([name,d])=>({name,avg:Math.round(d.total/d.count),count:d.count})).sort((a,b)=>b.avg-a.avg);
  const maxDeptAvg=depts.length?Math.max(...depts.map(d=>d.avg)):1;

  /* Monthly trend */
  const monthMap={};
  kpiEntries.forEach(e=>{
    if(!monthMap[e.month]) monthMap[e.month]={total:0,count:0};
    monthMap[e.month].total+=e.score; monthMap[e.month].count++;
  });
  const months=Object.keys(monthMap).sort().slice(-6);
  const monthLabels=months.map(m=>{
    const[y,mo]=m.split('-');
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y.slice(2);
  });
  const monthAvgs=months.map(m=>Math.round(monthMap[m].total/monthMap[m].count));

  /* Score distribution */
  const bucketCounts=[0,0,0,0,0];
  employees.forEach(e=>{
    if(e.kpi<30)bucketCounts[0]++;else if(e.kpi<60)bucketCounts[1]++;
    else if(e.kpi<90)bucketCounts[2]++;else if(e.kpi<120)bucketCounts[3]++;
    else bucketCounts[4]++;
  });

  /* ── Chart configs ── */
  const tooltipPlugin = {
    backgroundColor: tooltipBg,
    titleColor: tooltipText, bodyColor: tooltipText,
    borderColor: gridColor, borderWidth: 1,
    padding: 10, cornerRadius: 8
  };

  const donutData = {
    labels:['Excellent','Good','Poor'],
    datasets:[{
      data:[excellent||0.01,good||0.01,poor||0.01],
      backgroundColor:['rgba(0,229,160,0.85)','rgba(255,209,102,0.85)','rgba(255,107,122,0.85)'],
      borderColor: isDark?'#0e1018':'#ffffff', borderWidth:3, hoverOffset:6
    }]
  };
  const donutOpts = {
    responsive:true, maintainAspectRatio:false, cutout:'72%',
    plugins:{ legend:{display:false}, tooltip:{...tooltipPlugin, callbacks:{label:c=>` ${c.label}: ${c.raw===0.01?0:c.raw}`}} },
    animation:{animateRotate:true,duration:900}
  };

  const barData = {
    labels:['0–29','30–59','60–89','90–119','120–150'],
    datasets:[{
      label:'Employees', data:bucketCounts,
      backgroundColor:['rgba(255,107,122,0.7)','rgba(255,107,122,0.5)','rgba(255,209,102,0.7)','rgba(0,229,160,0.6)','rgba(0,229,160,0.9)'],
      borderRadius:8, borderSkipped:false, borderWidth:0
    }]
  };
  const barOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{...tooltipPlugin, callbacks:{label:c=>` ${c.raw} employee${c.raw!==1?'s':''}`}} },
    scales:{
      y:{beginAtZero:true,ticks:{color:tickColor,font:{size:11},stepSize:1},grid:{color:gridColor}},
      x:{ticks:{color:tickColor,font:{size:11}},grid:{display:false}}
    },
    animation:{duration:900,easing:'easeOutQuart'}
  };

  const lineData = {
    labels: monthLabels.length?monthLabels:['No Data'],
    datasets:[{
      label:'Avg KPI Score', data:monthAvgs.length?monthAvgs:[0],
      borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,0.1)',
      borderWidth:2.5, fill:true, tension:0.4,
      pointBackgroundColor:'#4f8ef7', pointRadius:5, pointHoverRadius:7
    }]
  };
  const lineOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{...tooltipPlugin, callbacks:{label:c=>` Avg: ${c.raw} pts`}} },
    scales:{
      y:{beginAtZero:false,ticks:{color:tickColor,font:{size:11}},grid:{color:gridColor}},
      x:{ticks:{color:tickColor,font:{size:11}},grid:{display:false}}
    },
    animation:{duration:900,easing:'easeOutQuart'}
  };

  /* ── Helpers ── */
  function perfClass(s){ return s>=120?'perf-excellent':s>=90?'perf-good':'perf-poor'; }
  function perfLabel(s){ return s>=120?'Excellent':s>=90?'Good':'Poor'; }
  function deptColor(a){ return a>=120?'#00e5a0':a>=90?'#ffd166':'#ff6b7a'; }
  function rankEmoji(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`; }

  const topEmployees=[...employees].sort((a,b)=>b.kpi-a.kpi).slice(0,6);
  const now=new Date();
  const thisM=now.toISOString().slice(0,7);
  const prev=new Date(now); prev.setMonth(prev.getMonth()-1);
  const lastM=prev.toISOString().slice(0,7);
  const thisAvg=monthMap[thisM]?Math.round(monthMap[thisM].total/monthMap[thisM].count):null;
  const lastAvg=monthMap[lastM]?Math.round(monthMap[lastM].total/monthMap[lastM].count):null;
  const trendDiff=(thisAvg!==null&&lastAvg!==null)?thisAvg-lastAvg:null;

  return (
    <>
      {/* Navbar */}
      <nav className="navbar">
        <span className="navbar-brand">📊 KPI Analytics</span>
        <div className="navbar-links">
          <a href="dashboard.html"    className="nav-link">🏠 Dashboard</a>
          <a href="add_employee.html" className="nav-link">👤 Add Employee</a>
          <a href="add_kpi.html"      className="nav-link">📝 Add KPI</a>
          <a href="view_kpi.html"     className="nav-link">📋 View KPI</a>
          <a href="analytics.html"    className="nav-link active">📊 Analytics</a>
          <button className="dark-toggle" onClick={toggleTheme}>
            {isDark ? '☀️ Light' : '🌙 Dark'}
          </button>
          <a href="login.html" className="nav-link nav-logout">🚪 Logout</a>
        </div>
      </nav>

      <div className="container">
        {/* Page Header */}
        <div className="page-header">
          <h1>Advanced Analytics</h1>
          <p>
            Deep insights into your team's KPI performance
            {trendDiff!==null && (
              <span className={`trend-badge ${trendDiff>=0?'trend-up':'trend-down'}`} style={{marginLeft:10}}>
                {trendDiff>=0?'▲':'▼'} {Math.abs(trendDiff)} pts vs last month
              </span>
            )}
          </p>
        </div>

        {totalEmps===0 ? (
          <div className="card">
            <div className="empty">
              <span className="empty-icon">📭</span>
              No employee data found. <a href="add_employee.html" style={{color:'#4f8ef7'}}>Add employees →</a>
            </div>
          </div>
        ) : (<>

          {/* Top Performer Banner */}
          {topPerformer&&topPerformer.kpi>=120&&(
            <div style={{
              background:'linear-gradient(135deg,rgba(0,229,160,0.15),rgba(79,142,247,0.15))',
              border:'1px solid rgba(0,229,160,0.3)',borderRadius:16,
              padding:'18px 24px',marginBottom:24,display:'flex',alignItems:'center',gap:16,
              animation:'fadeUp 0.5s ease both'
            }}>
              <span style={{fontSize:'2.2rem'}}>🏆</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'0.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'#00e5a0',marginBottom:2}}>Top Performer</div>
                <div style={{fontFamily:'Syne',fontSize:'1.2rem',fontWeight:800,color:'var(--text)'}}>{topPerformer.name}</div>
                <div style={{fontSize:'0.78rem',color:'var(--muted)'}}>{topPerformer.department} · {topPerformer.designation}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Syne',fontSize:'2rem',fontWeight:800,color:'#00e5a0'}}>{topPerformer.kpi}</div>
                <div style={{fontSize:'0.7rem',color:'var(--muted)'}}>KPI Score</div>
              </div>
            </div>
          )}

          {/* Stat Cards */}
          <div className="stat-grid">
            {[
              {cls:'blue',icon:'👥',label:'Total Employees',val:totalEmps},
              {cls:'green',icon:'⭐',label:'Avg KPI Score',val:avgScore,dur:1400},
              {cls:'yellow',icon:'🏅',label:'Excellent Performers',val:excellent},
              {cls:'red',icon:'📈',label:'Need Improvement',val:poor},
            ].map((c,i)=>(
              <div key={i} className={`stat-card ${c.cls} delay-${i+1}`}>
                <span className="stat-icon">{c.icon}</span>
                <div className="stat-label">{c.label}</div>
                <div className={`stat-value ${c.cls}`}><AnimatedCounter target={c.val} duration={c.dur||1200}/></div>
              </div>
            ))}
          </div>

          {/* Row 1: Trend + Donut */}
          <div className="charts-grid">
            <div className="card delay-5">
              <div className="card-header">
                <div><div className="card-title">📈 Monthly Score Trend</div><div className="card-sub">Average KPI score over last 6 months</div></div>
              </div>
              <div className="card-body">
                {monthLabels.length>0
                  ? <ChartCanvas id="lineChart" type="line" data={lineData} options={lineOpts} height={220}/>
                  : <div className="empty"><span className="empty-icon">📅</span>No monthly entries yet. <a href="add_kpi.html" style={{color:'#4f8ef7'}}>Add KPI →</a></div>
                }
              </div>
            </div>
            <div className="card delay-6">
              <div className="card-header">
                <div><div className="card-title">🍩 Performance Split</div><div className="card-sub">Distribution across tiers</div></div>
              </div>
              <div className="card-body">
                <ChartCanvas id="donutChart" type="doughnut" data={donutData} options={donutOpts} height={180}/>
                <div style={{display:'flex',justifyContent:'center',gap:20,marginTop:16}}>
                  {[['#00e5a0','Excellent',excellent],['#ffd166','Good',good],['#ff6b7a','Poor',poor]].map(([c,l,v])=>(
                    <div key={l} style={{textAlign:'center'}}>
                      <div style={{width:10,height:10,borderRadius:'50%',background:c,margin:'0 auto 4px'}}></div>
                      <div style={{fontSize:'0.7rem',color:'var(--muted)'}}>{l}</div>
                      <div style={{fontFamily:'Syne',fontWeight:800,fontSize:'1.1rem',color:c}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Row 2: Bar + Dept */}
          <div className="charts-grid">
            <div className="card" style={{animationDelay:'0.35s'}}>
              <div className="card-header">
                <div><div className="card-title">📊 Score Distribution</div><div className="card-sub">Employees spread across score ranges</div></div>
              </div>
              <div className="card-body">
                <ChartCanvas id="barChart" type="bar" data={barData} options={barOpts} height={220}/>
              </div>
            </div>
            <div className="card" style={{animationDelay:'0.4s'}}>
              <div className="card-header">
                <div><div className="card-title">🏢 Department Breakdown</div><div className="card-sub">Average KPI per department</div></div>
              </div>
              <div className="card-body">
                {depts.length===0
                  ? <div className="empty">No department data</div>
                  : depts.map(d=>(
                      <div className="dept-row" key={d.name}>
                        <div className="dept-name">{d.name}</div>
                        <div className="dept-bar-wrap"><div className="dept-bar-fill" style={{width:`${(d.avg/maxDeptAvg)*100}%`,background:deptColor(d.avg)}}></div></div>
                        <div className="dept-score" style={{color:deptColor(d.avg)}}>{d.avg}</div>
                        <div className="dept-count">{d.count} emp</div>
                      </div>
                    ))
                }
              </div>
            </div>
          </div>

          {/* Leaderboard */}
          <div className="card" style={{animationDelay:'0.45s'}}>
            <div className="card-header">
              <div><div className="card-title">🏆 Employee Leaderboard</div><div className="card-sub">Top performers ranked by KPI score</div></div>
            </div>
            <div className="card-body">
              {topEmployees.map((emp,i)=>(
                <div className="leader-row" key={emp.id}>
                  <div className="leader-rank">{rankEmoji(i)}</div>
                  <div style={{flex:1}}>
                    <div className="leader-name">{emp.name}</div>
                    <div className="leader-dept">{emp.department} · {emp.designation}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span className={`perf-pill ${perfClass(emp.kpi)}`}>{perfLabel(emp.kpi)}</span>
                    <div className="leader-score" style={{color:emp.kpi>=120?'#00e5a0':emp.kpi>=90?'#ffd166':'#ff6b7a'}}>{emp.kpi}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

        </>)}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
