<!DOCTYPE html>
<html data-theme="dark">
<head>
<title>Employee Portal</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('kpi_theme')||'dark'); })();</script>
<style>
  :root { --bg:#07080f; --surface:#0e1018; --surface2:#13151f; --border:rgba(255,255,255,0.07); --text:#e8eaf0; --muted:#5a6070; --navbar-bg:rgba(14,16,24,0.92); }
  [data-theme="light"] { --bg:#f0f2f5; --surface:#ffffff; --surface2:#f4f6fb; --border:rgba(0,0,0,0.08); --text:#1a1d2e; --muted:#8a93a8; --navbar-bg:rgba(20,22,38,0.97); }
  *{ box-sizing:border-box; margin:0; padding:0; transition:background-color 0.3s,color 0.2s,border-color 0.2s; }
  body{ font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before{ content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 20%,rgba(0,229,160,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(79,142,247,0.05) 0%,transparent 50%); pointer-events:none; z-index:0; }
  #root{ position:relative; z-index:1; }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .navbar{ display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:62px; background:var(--navbar-bg); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .navbar-brand{ font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; background:linear-gradient(135deg,#00e5a0,#4f8ef7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .navbar-right{ display:flex; gap:8px; align-items:center; }
  .nav-btn{ padding:6px 14px; border-radius:8px; font-size:0.78rem; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:transparent; color:var(--muted); text-decoration:none; transition:all 0.2s; }
  .nav-btn:hover{ color:var(--text); border-color:rgba(255,255,255,0.2); }
  .nav-btn.danger{ color:#ff6b7a; border-color:rgba(255,107,122,0.25); }
  .nav-btn.danger:hover{ background:rgba(255,107,122,0.1); }
  .dark-toggle{ display:flex; align-items:center; gap:5px; padding:6px 14px; border-radius:20px; cursor:pointer; font-size:0.76rem; font-weight:700; background:rgba(255,255,255,0.05); border:1.5px solid var(--border); color:var(--muted); transition:all 0.2s; }
  .dark-toggle:hover{ color:var(--text); background:rgba(255,255,255,0.1); }
  .container{ max-width:1000px; margin:0 auto; padding:32px 24px 60px; }
  .hero-card{ border-radius:20px; padding:28px 32px; margin-bottom:24px; background:linear-gradient(135deg,rgba(0,229,160,0.12),rgba(79,142,247,0.1)); border:1px solid rgba(0,229,160,0.2); display:flex; align-items:center; gap:24px; flex-wrap:wrap; animation:fadeUp 0.5s ease both; }
  .hero-avatar{ width:72px; height:72px; border-radius:20px; flex-shrink:0; background:linear-gradient(135deg,#00e5a0,#4f8ef7); display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow:0 4px 20px rgba(0,229,160,0.3); }
  .hero-info h2{ font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:4px; }
  .hero-info p{ color:var(--muted); font-size:0.85rem; }
  .tenure-badge{ display:inline-flex; align-items:center; gap:5px; background:rgba(79,142,247,0.12); border:1px solid rgba(79,142,247,0.25); border-radius:99px; padding:3px 12px; font-size:0.75rem; font-weight:600; color:#7cb9ff; margin-top:6px; }
  .hero-score{ margin-left:auto; text-align:right; }
  .hero-score .big{ font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; line-height:1; }
  .hero-score .lbl{ font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
  .stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
  @media(max-width:700px){ .stat-row{ grid-template-columns:repeat(2,1fr); } }
  .stat-box{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; animation:fadeUp 0.5s ease both; }
  .stat-box .val{ font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; }
  .stat-box .lbl{ font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:20px; animation:fadeUp 0.5s ease both; }
  .card-header{ padding:16px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .card-title{ font-family:'Syne',sans-serif; font-size:0.92rem; font-weight:800; color:var(--text); }
  .card-sub{ font-size:0.72rem; color:var(--muted); margin-top:2px; }
  .card-body{ padding:20px 22px; }
  .streak-wrap{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .streak-fire{ font-size:2.8rem; }
  .streak-num{ font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; color:#ffd166; line-height:1; }
  .streak-dots{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .streak-dot{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; }
  .streak-dot.hit{ background:rgba(0,229,160,0.2); color:#00e5a0; border:1.5px solid rgba(0,229,160,0.4); }
  .streak-dot.miss{ background:rgba(255,107,122,0.12); color:#ff6b7a; border:1.5px solid rgba(255,107,122,0.25); }
  .burnout-meter{ border-radius:14px; padding:18px 20px; border:1px solid var(--border); background:var(--surface2); }
  .burnout-bar-track{ height:14px; border-radius:99px; background:var(--border); overflow:hidden; margin:12px 0 8px; }
  .burnout-bar-fill{ height:100%; border-radius:99px; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .burnout-zones{ display:flex; justify-content:space-between; font-size:0.7rem; color:var(--muted); }
  .next-level{ background:var(--surface2); border-radius:12px; padding:16px 18px; margin-top:16px; border:1px solid var(--border); }
  .nl-bar-wrap{ height:10px; border-radius:99px; background:var(--border); overflow:hidden; margin:10px 0 6px; }
  .nl-bar-fill{ height:100%; border-radius:99px; background:linear-gradient(90deg,#4f8ef7,#00e5a0); transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
  table{ width:100%; border-collapse:collapse; }
  th{ font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
  td{ padding:11px 14px; font-size:0.88rem; border-bottom:1px solid var(--border); color:var(--text); }
  tr:last-child td{ border-bottom:none; }
  tr:hover td{ background:var(--surface2); }
  .sbar-wrap{ display:flex; align-items:center; gap:8px; }
  .sbar{ flex:1; height:6px; border-radius:99px; background:var(--surface2); overflow:hidden; max-width:80px; }
  .sbar-fill{ height:100%; border-radius:99px; }
  .pill{ padding:3px 10px; border-radius:99px; font-size:0.72rem; font-weight:700; }
  .pill-excellent{ background:rgba(0,229,160,0.15); color:#00e5a0; }
  .pill-good{ background:rgba(255,209,102,0.15); color:#ffd166; }
  .pill-poor{ background:rgba(255,107,122,0.15); color:#ff6b7a; }
  .rank-crown{ display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:99px; font-size:0.8rem; font-weight:700; }
  .rank-1{ background:rgba(255,209,102,0.2); color:#ffd166; border:1px solid rgba(255,209,102,0.3); }
  .rank-2{ background:rgba(180,180,180,0.15); color:#bbb; border:1px solid rgba(180,180,180,0.2); }
  .rank-3{ background:rgba(205,127,50,0.15); color:#cd7f32; border:1px solid rgba(205,127,50,0.2); }
  .rank-other{ background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
  .badges-grid{ display:flex; flex-wrap:wrap; gap:12px; }
  .badge-item{ display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; flex:1; min-width:160px; transition:transform 0.2s; }
  .badge-item:hover{ transform:translateY(-2px); }
  .badge-item.earned{ border-color:rgba(0,229,160,0.35); background:rgba(0,229,160,0.07); }
  .badge-item.locked{ opacity:0.45; filter:grayscale(0.6); }
  .badge-icon{ font-size:1.8rem; }
  .badge-name{ font-weight:700; font-size:0.85rem; color:var(--text); }
  .badge-desc{ font-size:0.72rem; color:var(--muted); margin-top:2px; }
  .badge-status{ margin-left:auto; font-size:0.7rem; font-weight:700; }
  .badge-status.earned{ color:#00e5a0; }
  .badge-status.locked{ color:var(--muted); }
  .tip-item{ display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
  .tip-item:last-child{ border-bottom:none; }
  .tip-icon{ font-size:1.3rem; flex-shrink:0; margin-top:2px; }
  .tip-text{ font-size:0.87rem; color:var(--text); line-height:1.5; }
  .tip-text strong{ color:#4f8ef7; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function Counter({ to, duration=1000 }) {
  const [val, setVal] = useState(0);
  useEffect(()=>{
    if(!to) return;
    let cur=0; const step=to/(duration/16);
    const t=setInterval(()=>{ cur+=step; if(cur>=to){setVal(to);clearInterval(t);}else setVal(Math.floor(cur)); },16);
    return ()=>clearInterval(t);
  },[to]);
  return <span>{val}</span>;
}

function LineChart({ data, options }) {
  const ref = useRef(null), chartRef = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current.getContext('2d'), { type:'line', data, options });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify(data)]);
  return <div style={{position:'relative',height:200}}><canvas ref={ref}></canvas></div>;
}

function App() {
  const [emp, setEmp]           = useState(null);
  const [entries, setEntries]   = useState([]);
  const [allEmps, setAllEmps]   = useState([]);
  const [theme, setTheme]       = useState(localStorage.getItem('kpi_theme')||'dark');
  const [notFound, setNotFound] = useState(false);

  useEffect(()=>{
    const loggedIn = sessionStorage.getItem('kpi_emp_logged_in');
    const empId    = sessionStorage.getItem('kpi_emp_id');
    if(!loggedIn || !empId){ window.location.href='login.html'; return; }
    const employees = JSON.parse(localStorage.getItem('kpi_employees')||'[]');
    const kpis      = JSON.parse(localStorage.getItem('kpi_entries')||'[]');
    const found = employees.find(e=>e.id==empId);
    if(!found){ setNotFound(true); return; }
    const empEntries = kpis.filter(k=>k.empId==empId).sort((a,b)=>a.month.localeCompare(b.month));
    setEmp(found); setAllEmps(employees); setEntries(empEntries);
  },[]);

  function toggleTheme(){
    const next=theme==='dark'?'light':'dark';
    setTheme(next); localStorage.setItem('kpi_theme',next);
    document.documentElement.setAttribute('data-theme',next);
  }
  function logout(){
    sessionStorage.removeItem('kpi_emp_logged_in');
    sessionStorage.removeItem('kpi_emp_id');
    sessionStorage.removeItem('kpi_emp_name');
    window.location.href='login.html';
  }
  function fmtMonth(m){
    if(!m) return '—';
    const[y,mo]=m.split('-');
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y;
  }
  function perfLabel(s){ return s>=120?'Excellent':s>=90?'Good':'Poor'; }
  function perfPill(s) { return s>=120?'pill-excellent':s>=90?'pill-good':'pill-poor'; }
  function barColor(s) { return s>=120?'#00e5a0':s>=90?'#ffd166':'#ff6b7a'; }

  if(notFound) return <div style={{padding:40,textAlign:'center',color:'#ff6b7a'}}>Employee not found. <a href="login.html" style={{color:'#4f8ef7'}}>Go back</a></div>;
  if(!emp) return <div style={{padding:40,textAlign:'center',color:'#5a6070'}}>Loading…</div>;

  const sorted     = [...allEmps].sort((a,b)=>b.kpi-a.kpi);
  const rank       = sorted.findIndex(e=>e.id===emp.id)+1;
  const total      = allEmps.length;
  const monthCount = entries.length;
  const avgScore   = monthCount ? Math.round(entries.reduce((s,e)=>s+e.score,0)/monthCount) : emp.kpi;
  const bestScore  = monthCount ? Math.max(...entries.map(e=>e.score)) : emp.kpi;
  const allExcellent = monthCount>0 && entries.every(e=>e.score>=120);
  const avgHours   = monthCount ? Math.round(entries.reduce((s,e)=>s+e.hours,0)/monthCount) : 0;

  function rankBadge(r){
    if(r===1) return <span className="rank-crown rank-1">🥇 Rank #1</span>;
    if(r===2) return <span className="rank-crown rank-2">🥈 Rank #2</span>;
    if(r===3) return <span className="rank-crown rank-3">🥉 Rank #3</span>;
    return <span className="rank-crown rank-other">#{r} of {total}</span>;
  }

  function getTenure(joinDate){
    if(!joinDate) return null;
    const join = new Date(joinDate);
    const now  = new Date();
    const months = (now.getFullYear()-join.getFullYear())*12 + (now.getMonth()-join.getMonth());
    if(months < 1)  return 'Less than a month';
    if(months < 12) return `${months} month${months>1?'s':''} tenure`;
    const yrs = Math.floor(months/12), rem = months%12;
    return `${yrs}y ${rem}m tenure`;
  }
  const tenure      = getTenure(emp.joinDate);
  const joinDisplay = emp.joinDate ? new Date(emp.joinDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : null;

  const streak = (()=>{
    if(!monthCount) return 0;
    const rev = [...entries].reverse();
    let count = 0;
    for(const e of rev){ if(e.score>=90) count++; else break; }
    return count;
  })();
  const last6 = entries.slice(-6);

  function nextLevel(s){
    if(s<90)  return { label:'Good (90)',       target:90,  from:0   };
    if(s<120) return { label:'Excellent (120)', target:120, from:90  };
    return           { label:'Max Level! 🎉',   target:150, from:120 };
  }
  const nl    = nextLevel(emp.kpi);
  const nlPct = Math.min(Math.round(((emp.kpi-nl.from)/(nl.target-nl.from))*100),100);

  const burnoutPct = Math.min(Math.round((avgHours/300)*100),100);
  function burnoutInfo(h){
    if(h < 100) return { label:'Underworked 😴', color:'#4f8ef7', msg:'Hours are low. Try to log more time to boost your KPI score.' };
    if(h < 180) return { label:'Healthy ✅',      color:'#00e5a0', msg:'Great balance! Your working hours are in the ideal range.' };
    if(h < 240) return { label:'Engaged 💪',      color:'#ffd166', msg:'You\'re putting in solid hours. Make sure to take breaks.' };
    return             { label:'Burnout Risk 🔥', color:'#ff6b7a', msg:'Very high hours detected. Consider discussing workload with your manager.' };
  }
  const burnout = burnoutInfo(avgHours);

  const badges = [
    { icon:'🏆', name:'Top Scorer',     desc:'Score ≥120',           earned: emp.kpi>=120 },
    { icon:'🔥', name:'On Fire',        desc:'3+ entries, all ≥90',  earned: monthCount>=3 && entries.filter(e=>e.score>=90).length>=3 },
    { icon:'🎯', name:'Consistent',     desc:'≥2 months tracked',    earned: monthCount>=2 },
    { icon:'⭐', name:'Star Performer', desc:'Best score ever ≥130', earned: bestScore>=130 },
    { icon:'💎', name:'Diamond',        desc:'All entries Excellent', earned: allExcellent && monthCount>0 },
    { icon:'🚀', name:'Rising Star',    desc:'Avg score ≥100',       earned: avgScore>=100 },
  ];

  const isDark    = theme==='dark';
  const gridColor = isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)';
  const tickColor = isDark?'#5a6070':'#8a93a8';
  const chartData = {
    labels: entries.map(e=>fmtMonth(e.month)),
    datasets:[{
      label:'KPI Score', data:entries.map(e=>e.score),
      borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,0.1)',
      borderWidth:2.5, fill:true, tension:0.4,
      pointBackgroundColor:entries.map(e=>barColor(e.score)),
      pointRadius:6, pointHoverRadius:8
    }]
  };
  const chartOpts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false}, tooltip:{ backgroundColor:isDark?'#13151f':'#fff', titleColor:isDark?'#e8eaf0':'#1a1d2e', bodyColor:isDark?'#e8eaf0':'#1a1d2e', borderColor:gridColor, borderWidth:1, padding:10, cornerRadius:8, callbacks:{ label:c=>` Score: ${c.raw} (${perfLabel(c.raw)})` } } },
    scales:{ y:{ beginAtZero:false, min:0, max:160, ticks:{color:tickColor,font:{size:11}}, grid:{color:gridColor} }, x:{ ticks:{color:tickColor,font:{size:11}}, grid:{display:false} } },
    animation:{duration:800,easing:'easeOutQuart'}
  };

  function getTips(score, entries){
    const tips=[];
    if(score<90)   tips.push({icon:'📚',text:<><strong>Focus on tasks:</strong> Each task adds 5 pts. Aim for 18+ tasks/month to reach 90.</>});
    if(score<120)  tips.push({icon:'🐛',text:<><strong>Fix more bugs:</strong> Each bug adds 3 pts. Target 10+ bug fixes monthly.</>});
    if(score<120)  tips.push({icon:'⏱',text:<><strong>Log more hours:</strong> Every 2 hours adds 1 pt. Stay consistent.</>});
    if(score>=120) tips.push({icon:'🌟',text:<><strong>You're Excellent!</strong> Mentor teammates and maintain this pace.</>});
    if(entries.length<3) tips.push({icon:'📅',text:<><strong>Get tracked regularly:</strong> Ask admin to log your KPI monthly.</>});
    const trend=entries.length>=2?entries[entries.length-1].score-entries[entries.length-2].score:0;
    if(trend<0)  tips.push({icon:'📉',text:<><strong>Score dropped:</strong> Identify the weakest metric — tasks, bugs, or hours.</>});
    if(trend>10) tips.push({icon:'📈',text:<><strong>Great improvement!</strong> +{trend} pts last month. Keep going!</>});
    if(tips.length===0) tips.push({icon:'💪',text:<><strong>Keep it up!</strong> Consistency is key to excellence.</>});
    return tips.slice(0,4);
  }
  const tips = getTips(emp.kpi, entries);

  return (
    <>
      <nav className="navbar">
        <span className="navbar-brand">👤 Employee Portal</span>
        <div className="navbar-right">
          <button className="dark-toggle" onClick={toggleTheme}>{isDark?'☀️ Light':'🌙 Dark'}</button>
          <button className="nav-btn danger" onClick={logout}>🚪 Logout</button>
        </div>
      </nav>

      <div className="container">

        <div className="hero-card">
          <div className="hero-avatar">{emp.name.charAt(0).toUpperCase()}</div>
          <div className="hero-info">
            <h2>{emp.name}</h2>
            <p>{emp.department} &nbsp;·&nbsp; {emp.designation}</p>
            <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
              {rankBadge(rank)}
              {joinDisplay && <span className="tenure-badge">📅 Joined {joinDisplay}{tenure ? ` · ${tenure}` : ''}</span>}
            </div>
          </div>
          <div className="hero-score">
            <div className="big" style={{color:barColor(emp.kpi)}}>{emp.kpi}</div>
            <div className="lbl">Current KPI Score</div>
            <div style={{marginTop:8}}><span className={`pill ${perfPill(emp.kpi)}`}>{perfLabel(emp.kpi)}</span></div>
          </div>
        </div>

        <div className="stat-row">
          {[
            {icon:'📊',label:'KPI Score',     val:emp.kpi,    color:barColor(emp.kpi)},
            {icon:'🏅',label:'Team Rank',      val:`#${rank}`, color:'#ffd166',raw:true},
            {icon:'📅',label:'Months Tracked', val:monthCount, color:'#4f8ef7'},
            {icon:'⭐',label:'Avg Score',       val:avgScore,   color:'#b17bff'},
          ].map((s,i)=>(
            <div className="stat-box" key={i} style={{animationDelay:`${i*0.05}s`}}>
              <div style={{fontSize:'1.4rem',marginBottom:6}}>{s.icon}</div>
              <div className="val" style={{color:s.color}}>{s.raw?s.val:<Counter to={s.val}/>}</div>
              <div className="lbl">{s.label}</div>
            </div>
          ))}
        </div>

        <div className="card" style={{animationDelay:'0.15s'}}>
          <div className="card-header">
            <div><div className="card-title">🔥 Performance Streak</div><div className="card-sub">Consecutive months with score ≥90</div></div>
          </div>
          <div className="card-body">
            <div className="streak-wrap">
              <span className="streak-fire">🔥</span>
              <div>
                <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                  <div className="streak-num">{streak}</div>
                  <div style={{fontSize:'0.85rem',color:'var(--muted)',fontWeight:600}}>month{streak!==1?'s':''} in a row</div>
                </div>
                <div style={{fontSize:'0.78rem',color:'var(--muted)',marginTop:4}}>
                  {streak===0 && 'No active streak. Score ≥90 to start one!'}
                  {streak===1 && 'Good start! Keep scoring ≥90 next month.'}
                  {streak>=2 && streak<5 && 'Building momentum! Keep going 💪'}
                  {streak>=5 && '🏆 Outstanding streak! You\'re on fire!'}
                </div>
              </div>
            </div>
            {last6.length>0 && (
              <div className="streak-dots" style={{marginTop:14}}>
                {last6.map((e,i)=>(
                  <div key={i} className={`streak-dot ${e.score>=90?'hit':'miss'}`} title={`${fmtMonth(e.month)}: ${e.score}`}>
                    {e.score>=90?'✓':'✗'}
                  </div>
                ))}
                <span style={{fontSize:'0.72rem',color:'var(--muted)',alignSelf:'center',marginLeft:4}}>last {last6.length} months</span>
              </div>
            )}
          </div>
        </div>

        <div className="card" style={{animationDelay:'0.2s'}}>
          <div className="card-header">
            <div><div className="card-title">🌡 Burnout Indicator</div><div className="card-sub">Based on average monthly hours worked</div></div>
          </div>
          <div className="card-body">
            <div className="burnout-meter">
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.82rem'}}>
                <span style={{color:'var(--text)',fontWeight:600}}>Avg Hours/Month: <span style={{color:burnout.color}}>{avgHours}h</span></span>
                <span style={{fontWeight:700,color:burnout.color}}>{burnout.label}</span>
              </div>
              <div className="burnout-bar-track">
                <div className="burnout-bar-fill" style={{width:`${burnoutPct}%`,background:`linear-gradient(90deg,#4f8ef7,${burnout.color})`}}></div>
              </div>
              <div className="burnout-zones">
                <span>0h</span><span style={{color:'#00e5a0'}}>100–180h Ideal</span><span>300h+</span>
              </div>
              <div style={{fontSize:'0.8rem',color:'var(--muted)',marginTop:10,lineHeight:1.5}}>{burnout.msg}</div>
            </div>
          </div>
        </div>

        <div className="card" style={{animationDelay:'0.25s'}}>
          <div className="card-header">
            <div><div className="card-title">🎯 Progress to Next Level</div><div className="card-sub">How close you are to the next performance tier</div></div>
          </div>
          <div className="card-body">
            <div className="next-level">
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.82rem'}}>
                <span style={{color:'var(--text)',fontWeight:600}}>Current: <span style={{color:barColor(emp.kpi)}}>{emp.kpi} pts</span></span>
                <span style={{color:'var(--muted)'}}>Target: <strong style={{color:'var(--text)'}}>{nl.label}</strong></span>
              </div>
              <div className="nl-bar-wrap"><div className="nl-bar-fill" style={{width:`${nlPct}%`}}></div></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.75rem',color:'var(--muted)'}}>
                <span>{nl.from} pts</span>
                <span style={{color:'#4f8ef7',fontWeight:700}}>{nlPct}% there</span>
                <span>{nl.target} pts</span>
              </div>
            </div>
          </div>
        </div>

        <div className="card" style={{animationDelay:'0.3s'}}>
          <div className="card-header">
            <div><div className="card-title">📈 KPI Score History</div><div className="card-sub">Your performance trend over time</div></div>
          </div>
          <div className="card-body">
            {entries.length===0
              ? <div style={{textAlign:'center',color:'var(--muted)',padding:'30px 0'}}>No monthly KPI entries yet. Ask your admin to log your KPI.</div>
              : <LineChart data={chartData} options={chartOpts}/>
            }
          </div>
        </div>

        {entries.length>0 && (
          <div className="card" style={{animationDelay:'0.35s'}}>
            <div className="card-header">
              <div><div className="card-title">📋 Monthly Breakdown</div><div className="card-sub">Detailed KPI entries per month</div></div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table>
                <thead><tr><th>Month</th><th>Tasks</th><th>Bugs</th><th>Hours</th><th>Score</th><th>Status</th></tr></thead>
                <tbody>
                  {[...entries].reverse().map((e,i)=>(
                    <tr key={i}>
                      <td><strong>{fmtMonth(e.month)}</strong></td>
                      <td>{e.tasks}</td><td>{e.bugs}</td><td>{e.hours}</td>
                      <td>
                        <div className="sbar-wrap">
                          <div className="sbar"><div className="sbar-fill" style={{width:`${Math.min((e.score/150)*100,100)}%`,background:barColor(e.score)}}></div></div>
                          <strong style={{color:barColor(e.score)}}>{e.score}</strong>
                        </div>
                      </td>
                      <td><span className={`pill ${perfPill(e.score)}`}>{perfLabel(e.score)}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        <div className="card" style={{animationDelay:'0.4s'}}>
          <div className="card-header">
            <div><div className="card-title">🏅 Your Badges</div><div className="card-sub">{badges.filter(b=>b.earned).length} of {badges.length} earned</div></div>
          </div>
          <div className="card-body">
            <div className="badges-grid">
              {badges.map((b,i)=>(
                <div key={i} className={`badge-item ${b.earned?'earned':'locked'}`}>
                  <span className="badge-icon">{b.icon}</span>
                  <div><div className="badge-name">{b.name}</div><div className="badge-desc">{b.desc}</div></div>
                  <div className={`badge-status ${b.earned?'earned':'locked'}`}>{b.earned?'✓ Earned':'🔒 Locked'}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="card" style={{animationDelay:'0.45s'}}>
          <div className="card-header">
            <div><div className="card-title">💡 Tips to Improve</div><div className="card-sub">Personalized advice based on your performance</div></div>
          </div>
          <div className="card-body">
            {tips.map((t,i)=>(
              <div key={i} className="tip-item">
                <span className="tip-icon">{t.icon}</span>
                <div className="tip-text">{t.text}</div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
