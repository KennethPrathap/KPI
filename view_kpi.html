<!DOCTYPE html>
<html data-theme="light">
<head>
<title>View KPI Records</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="shared.js" defer></script>
<style>
  .page-card { background:var(--surface); border:none; border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .page-card .card-header { background:var(--card-hdr); border:none; padding:14px 22px; }

  
  .filter-bar { background:var(--surface2); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .filter-bar input, .filter-bar select { border-radius:8px; border:1.5px solid var(--input-border); background:var(--input-bg); color:var(--text); padding:6px 12px; font-size:0.83rem; outline:none; transition:border-color 0.2s; }
  .filter-bar input:focus, .filter-bar select:focus { border-color:#4f8ef7; }

  
  .summary-chip { display:inline-flex; align-items:center; gap:7px; background:var(--surface); border-radius:10px; padding:8px 16px; box-shadow:var(--shadow); font-size:0.83rem; color:var(--text); }
  .chip-dot { width:10px; height:10px; border-radius:50%; }

  
  .score-bar-wrap { display:flex; align-items:center; gap:8px; min-width:110px; }
  .score-bar { flex:1; height:7px; border-radius:99px; background:var(--border); overflow:hidden; }
  .score-bar-fill { height:100%; border-radius:99px; transition:width 0.4s; }
  .score-num { font-weight:700; font-size:0.85rem; min-width:28px; }

  
  .status-badge { padding:5px 14px; border-radius:99px; font-size:0.76rem; font-weight:700; letter-spacing:0.3px; }
  .badge-excellent { background:linear-gradient(135deg,#11998e,#38ef7d); color:#fff; }
  .badge-good      { background:linear-gradient(135deg,#f7971e,#ffd200); color:#333; }
  .badge-poor      { background:linear-gradient(135deg,#cb2d3e,#ef473a); color:#fff; }

  
  .month-pill { background:var(--surface2); color:var(--text); border-radius:8px; padding:3px 10px; font-size:0.78rem; font-weight:600; border:1.5px solid var(--border); }

  .empty-state { color:var(--text-muted); font-size:0.92rem; }
</style>
</head>
<body>

<div id="navbarMount" data-page="view_kpi"></div>

<div id="pageContent">
<div class="container mt-4 pb-5">

  
  <div class="d-flex flex-wrap gap-3 mb-4 animate-up">
    <div class="summary-chip"><span class="chip-dot" style="background:#4f8ef7"></span>Total: <strong id="chipTotal">0</strong></div>
    <div class="summary-chip"><span class="chip-dot" style="background:#28a745"></span>Excellent: <strong id="chipExcellent">0</strong></div>
    <div class="summary-chip"><span class="chip-dot" style="background:#ffc107"></span>Good: <strong id="chipGood">0</strong></div>
    <div class="summary-chip"><span class="chip-dot" style="background:#dc3545"></span>Poor: <strong id="chipPoor">0</strong></div>
    <div class="summary-chip"><span class="chip-dot" style="background:#6f42c1"></span>Avg Score: <strong id="chipAvg">—</strong></div>
  </div>

  <div class="page-card animate-up" style="animation-delay:0.1s;">
    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="text-white mb-0 fw-semibold">📋 KPI Records</h5>
      <div class="d-flex gap-2">
        <a href="add_kpi.html" class="nav-btn nav-btn-ghost" style="font-size:0.75rem;padding:4px 12px;">+ Add KPI</a>
        <button class="nav-btn nav-btn-danger" style="font-size:0.75rem;padding:4px 12px;" onclick="clearAllKPIs()">🗑 Clear All</button>
      </div>
    </div>

    
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search employee…" oninput="applyFilters()">
      <select id="statusFilter" onchange="applyFilters()">
        <option value="">All Statuses</option>
        <option>Excellent</option><option>Good</option><option>Poor</option>
      </select>
      <select id="monthFilter" onchange="applyFilters()">
        <option value="">All Months</option>
      </select>
      <button class="btn btn-sm btn-outline-secondary py-0 ms-auto" onclick="resetFilters()">Reset</button>
    </div>

    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr><th>#</th><th>Employee</th><th>Month</th><th>Tasks ✅</th><th>Bugs 🐛</th><th>Hours ⏱</th><th>Score</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="kpiTableBody">
          <tr><td colspan="9" class="text-center empty-state py-5">No KPI entries yet. <a href="add_kpi.html">Add one →</a></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="noResults" class="text-center empty-state mt-4" style="display:none;">
    No records match your filters. <button class="btn btn-sm btn-outline-secondary ms-2" onclick="resetFilters()">Reset</button>
  </div>

</div>
</div>

<script>
  function getKPIs()      { return JSON.parse(localStorage.getItem('kpi_entries')||'[]'); }
  function saveKPIs(l)    { localStorage.setItem('kpi_entries',JSON.stringify(l)); }

  function getPerf(s){
    if(s>=120) return{label:'Excellent',badgeClass:'badge-excellent',barColor:'#28a745'};
    if(s>=90)  return{label:'Good',     badgeClass:'badge-good',      barColor:'#ffc107'};
    return          {label:'Poor',      badgeClass:'badge-poor',      barColor:'#dc3545'};
  }

  function fmtMonth(m){
    if(!m) return '—';
    const[y,mo]=m.split('-');
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y;
  }

  let allEntries=[];

  function deleteEntry(id){
    if(!confirm('Delete this KPI entry?')) return;
    allEntries=allEntries.filter(e=>e.id!==id); saveKPIs(allEntries); init();
  }
  function clearAllKPIs(){
    if(!confirm('Clear ALL KPI records?')) return;
    saveKPIs([]); init();
  }
  function resetFilters(){
    document.getElementById('searchInput').value='';
    document.getElementById('statusFilter').value='';
    document.getElementById('monthFilter').value='';
    applyFilters();
  }

  function applyFilters(){
    const search=document.getElementById('searchInput').value.toLowerCase();
    const status=document.getElementById('statusFilter').value;
    const month=document.getElementById('monthFilter').value;
    const filtered=allEntries.filter(e=>{
      const perf=getPerf(e.score);
      return e.empName.toLowerCase().includes(search)&&(!status||perf.label===status)&&(!month||e.month===month);
    });
    renderTable(filtered);
    document.getElementById('noResults').style.display=filtered.length===0&&allEntries.length>0?'block':'none';
  }

  function renderTable(entries){
    const tbody=document.getElementById('kpiTableBody');
    if(!entries.length&&!allEntries.length){
      tbody.innerHTML=`<tr><td colspan="9" class="text-center empty-state py-5">No KPI entries yet. <a href="add_kpi.html">Add one →</a></td></tr>`; return;
    }
    if(!entries.length){ tbody.innerHTML=''; return; }
    tbody.innerHTML=entries.map((e,i)=>{
      const perf=getPerf(e.score);
      const pct=Math.min(Math.round((e.score/150)*100),100);
      return `<tr>
        <td class="text-muted">${i+1}</td>
        <td><strong>${e.empName}</strong></td>
        <td><span class="month-pill">${fmtMonth(e.month)}</span></td>
        <td>${e.tasks}</td><td>${e.bugs}</td><td>${e.hours}</td>
        <td>
          <div class="score-bar-wrap">
            <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${perf.barColor};"></div></div>
            <span class="score-num" style="color:${perf.barColor}">${e.score}</span>
          </div>
        </td>
        <td><span class="status-badge ${perf.badgeClass}">${perf.label}</span></td>
        <td><button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteEntry(${e.id})">✕</button></td>
      </tr>`;
    }).join('');
  }

  function populateMonthFilter(entries){
    const months=[...new Set(entries.map(e=>e.month))].sort().reverse();
    const sel=document.getElementById('monthFilter');
    sel.innerHTML='<option value="">All Months</option>';
    months.forEach(m=>{ sel.innerHTML+=`<option value="${m}">${fmtMonth(m)}</option>`; });
  }

  function updateSummary(entries){
    const ex=entries.filter(e=>e.score>=120).length;
    const gd=entries.filter(e=>e.score>=90&&e.score<120).length;
    const pr=entries.filter(e=>e.score<90).length;
    const avg=entries.length?Math.round(entries.reduce((s,e)=>s+e.score,0)/entries.length):null;
    document.getElementById('chipTotal').textContent=entries.length;
    document.getElementById('chipExcellent').textContent=ex;
    document.getElementById('chipGood').textContent=gd;
    document.getElementById('chipPoor').textContent=pr;
    document.getElementById('chipAvg').textContent=avg!==null?avg:'—';
  }

  function init(){
    allEntries=getKPIs();
    populateMonthFilter(allEntries);
    updateSummary(allEntries);
    applyFilters();
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
